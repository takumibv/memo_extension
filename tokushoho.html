<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特定商取引法に基づく表記 - Note Everywhere</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      color: #333;
      line-height: 1.8;
      background: #fafafa;
    }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 0;
    }
    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .header a { font-size: 18px; font-weight: 700; color: #111; }
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 32px; color: #111; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 32px;
    }
    th, td {
      border: 1px solid #e5e7eb;
      padding: 14px 18px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f9fafb;
      font-weight: 600;
      width: 200px;
      white-space: nowrap;
    }
    td { background: #fff; }
    .back { margin-top: 48px; font-size: 14px; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html">📝 Note Everywhere</a>
    </div>
  </header>

  <main class="content">
    <h1>特定商取引法に基づく表記</h1>

    <table>
      <tr>
        <th>販売者名</th>
        <td>下條拓未</td>
      </tr>
      <tr>
        <th>所在地</th>
        <td>請求があった場合に遅滞なく開示いたします。</td>
      </tr>
      <tr>
        <th>連絡先</th>
        <td>
          メールアドレス: <a href="mailto:takumibv@gmail.com">takumibv@gmail.com</a><br>
          電話番号: 請求があった場合に遅滞なく開示いたします。
        </td>
      </tr>
      <tr>
        <th>販売価格</th>
        <td>各販売ページに記載の通り</td>
      </tr>
      <tr>
        <th>支払方法</th>
        <td>クレジットカード</td>
      </tr>
      <tr>
        <th>支払時期</th>
        <td>購入手続き完了時に即時決済</td>
      </tr>
      <tr>
        <th>商品の引渡時期</th>
        <td>該当なし（寄付・サポート型の決済のため）</td>
      </tr>
      <tr>
        <th>返品・キャンセル</th>
        <td>デジタルコンテンツ・サポートの性質上、返品・返金には対応しておりません。</td>
      </tr>
    </table>

    <p class="back"><a href="index.html">&larr; トップページに戻る</a></p>
  </main>

</body>
</html>
